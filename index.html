<!DOCTYPE html>
<html>
<head>
    <title>Legal AI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: #0f172a;
            color: white;
            display: flex;
        }

        .sidebar {
            width: 220px;
            background: #020617;
            padding: 20px;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            border: none;
            border-radius: 8px;
            color: white;
            height: 20%;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #2563eb;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    min-height: 120px;
}

        .cases {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

      .case-card {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    border-left: 4px solid #38bdf8;
    height: 160px;
    overflow-y: auto;
}
#summaryBox {
    background: #022c22;
}

        .keyword {
            background: #2563eb;
            padding: 5px 10px;
            border-radius: 6px;
            margin-right: 5px;
            display: inline-block;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>⚖️ Legal AI</h2>
</div>

<div class="main">

    <h1>Legal AI Dashboard</h1>

    <textarea id="inputText" rows="3"
    placeholder="Enter case..."></textarea>

    <button onclick="predict()">Analyze</button>

    <!-- TOP GRID -->
    <div class="grid">
        <div class="card" id="prediction"></div>
        <div class="card" id="keywords"></div>
    </div>

    <!-- GRAPH + SUGGESTION SIDE BY SIDE -->
    <div class="grid">
        <div class="card">
            <h3>📊 Confidence</h3>
            <div style="max-width:250px;margin:auto;">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <div class="card" id="summaryBox">
            <h3>🧾 Case Insight</h3>
        </div>
    </div>

    <!-- SIMILAR CASES -->
    <div class="card">
        <h3>📚 Similar Cases</h3>
        <div class="cases" id="similar"></div>
    </div>

</div>
<script>
let chart;

async function predict() {
    const text = document.getElementById("inputText").value;

    const res = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text })
    });

    const data = await res.json();

    // Prediction
    document.getElementById("prediction").innerHTML =
        `<h2>${data.prediction}</h2>
         <p>${(data.confidence * 100).toFixed(1)}%</p>`;

    // Keywords
    let khtml = "<h3>🔍 Key Factors</h3>";
    data.keywords.forEach(k => {
        khtml += `<span class="keyword">${k}</span>`;
    });
    document.getElementById("keywords").innerHTML = khtml;

    // Chart
    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Win', 'Lose'],
            datasets: [{
                data: [
                    data.prediction === "Win" ? data.confidence : 1 - data.confidence,
                    data.prediction === "Lose" ? data.confidence : 1 - data.confidence
                ]
            }]
        }
    });

    // Similar cases
    let html = "";
let summaryHTML = "";

data.similar_cases.forEach((c, i) => {
    html += `
    <div class="case-card">
        <b>Case ${i+1}</b><br><br>
        ${c.summary}
    </div>`;

    // Take first case for insight
    if (i === 0) {
        summaryHTML = `
        <p>${c.summary}</p>
        `;
    }
});

document.getElementById("similar").innerHTML = html;
document.getElementById("summaryBox").innerHTML += summaryHTML;
}
</script>

</body>
</html>
